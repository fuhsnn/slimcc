on:
  workflow_call:
    inputs:
      vm:
        required: true
        type: string
      file:
        required: true
        type: string

jobs:
  docker-build-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: .
          file: scripts/${{ inputs.file }}.Dockerfile
          tags: ${{ inputs.vm }}:latest
          outputs: type=docker,dest=/tmp/${{ inputs.vm }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: setup-toolchain

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.vm }}
          path: /tmp/${{ inputs.vm }}.tar
          compression-level: 0
